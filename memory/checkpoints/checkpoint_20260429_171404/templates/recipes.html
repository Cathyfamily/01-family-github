<div class="card fade-in">
    <h2>🍳 食譜管理 (Recipes)</h2>
    <form action="{{ url_for('add_recipe') }}" method="POST" class="add-form">
        <div class="form-group row">
            <input type="text" name="name" placeholder="食譜名稱 (Recipe Name)" required>
            <input type="url" name="image_url" placeholder="圖片網址 (Image URL) - 選填">
        </div>
        <div class="form-group">
            <textarea name="ingredients" placeholder="食材清單 (Ingredients)" rows="3" required></textarea>
        </div>
        <div class="form-group">
            <textarea name="instructions" placeholder="料理步驟 (Instructions)" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">新增食譜</button>
    </form>

    <div class="sort-control mt-4 text-right">
        <label for="sort-recipes">排序方式: </label>
        <select id="sort-recipes" class="sort-select" style="padding: 0.3rem; border-radius: 4px;">
            <option value="time-desc">建立時間 (新到舊)</option>
            <option value="time-asc">建立時間 (舊到新)</option>
            <option value="name-asc">名稱 (筆畫/A-Z)</option>
        </select>
    </div>

    <div class="grid-container mt-2" id="recipes-grid">
        {% for recipe in recipes %}
        <div class="grid-item recipe-item" data-time="{{ recipe.created_at.isoformat() }}" data-name="{{ recipe.name }}">
            {% if recipe.image_url %}
            <div class="card-img" style="background-image: url('{{ recipe.image_url }}')"></div>
            {% else %}
            <div class="card-img placeholder">🍲 無圖片</div>
            {% endif %}
            <div class="card-body">
                <h3>{{ recipe.name }}</h3>
                <h4>食材:</h4>
                <p class="pre-line">{{ recipe.ingredients }}</p>
                <h4>步驟:</h4>
                <p class="pre-line">{{ recipe.instructions }}</p>
                <form action="{{ url_for('delete_recipe', id=recipe.id) }}" method="POST" class="mt-2 text-right">
                    <button type="submit" class="btn btn-danger btn-sm">刪除</button>
                </form>
            </div>
        </div>
        {% else %}
        <p class="text-center col-span-full">尚無食譜紀錄</p>
        {% endfor %}
    </div>
</div>
