<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family 管理中心</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="logo">Family <span>Hub</span></div>

        <button class="nav-item active" id="nav-stocks" onclick="switchTab('stocks')">
            <span class="icon">📈</span><span class="label">股票管理</span>
        </button>
        <button class="nav-item" id="nav-milestones" onclick="switchTab('milestones')">
            <span class="icon">🧒</span><span class="label">成長紀錄</span>
        </button>
        <button class="nav-item" id="nav-recipes" onclick="switchTab('recipes')">
            <span class="icon">🍳</span><span class="label">美味食譜</span>
        </button>

        <div class="nav-spacer"></div>

        <a href="{{ url_for('logout') }}" style="text-decoration:none;">
            <div class="nav-item logout-btn">
                <span class="icon">🚪</span><span class="label">登出</span>
            </div>
        </a>
    </nav>

    <!-- Bottom Nav (iPhone) -->
    <nav class="bottom-nav">
        <button class="bottom-nav-item active" id="bnav-stocks" onclick="switchTab('stocks')">
            <span class="icon">📈</span>股票
        </button>
        <button class="bottom-nav-item" id="bnav-milestones" onclick="switchTab('milestones')">
            <span class="icon">🧒</span>成長
        </button>
        <button class="bottom-nav-item" id="bnav-recipes" onclick="switchTab('recipes')">
            <span class="icon">🍳</span>食譜
        </button>
        <a href="{{ url_for('logout') }}" class="bottom-nav-item" style="text-decoration:none;">
            <span class="icon">🚪</span>登出
        </a>
    </nav>

    <!-- Main Content -->
    <main>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="flash-list">
              {% for message in messages %}
                <li>{{ message }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.bottom-nav-item').forEach(el => el.classList.remove('active'));

            const tabEl = document.getElementById(tabId);
            if (tabEl) tabEl.classList.add('active');

            const sideNav = document.getElementById('nav-' + tabId);
            if (sideNav) sideNav.classList.add('active');

            const botNav = document.getElementById('bnav-' + tabId);
            if (botNav) botNav.classList.add('active');

            localStorage.setItem('activeTab', tabId);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const tab = params.get('tab') || localStorage.getItem('activeTab') || 'stocks';
            switchTab(tab);
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
