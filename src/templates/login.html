<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - FamilyHQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 1rem;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .mb-4 { margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card login-card fade-in">
            <h1 class="logo mb-4" style="font-size: 2.5rem;">FamilyHQ</h1>
            <p class="text-muted mb-4">請輸入專屬密碼以存取家庭資料</p>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div style="color: var(--danger); margin-bottom: 1rem; font-weight: 500;">
                {% for message in messages %}
                  {{ message }}
                {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <input type="password" name="password" placeholder="請輸入密碼" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">安全登入</button>
            </form>
        </div>
    </div>
</body>
</html>
