<div id="milestones" class="tab-content fade-in">
    <div class="page-header">
        <h1>🧒 成長紀錄</h1>
        <p>記錄寶貝每一個珍貴時刻</p>
    </div>

    <div class="section-card">
        <div class="section-title">新增里程碑</div>
        <form action="{{ url_for('add_milestone') }}" method="POST" id="milestone-form">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">里程碑標題</label>
                    <input type="text" name="title" placeholder="例：第一次學會走路" required>
                </div>
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="date" name="date" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">選擇照片</label>
                <input type="file" id="m-upload" accept="image/*">
                <input type="hidden" name="image_url" id="m-img-data">
            </div>
            <div class="form-group">
                <label class="form-label">描述</label>
                <textarea name="description" rows="3" placeholder="記錄這個特別時刻..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">＋ 新增里程碑</button>
        </form>
    </div>

    <div class="sort-bar">
        排序：
        <select id="sort-milestones" onchange="sortMilestones(this.value)">
            <option value="date-desc">日期（新到舊）</option>
            <option value="date-asc">日期（舊到新）</option>
        </select>
    </div>

    <div id="milestones-grid" class="grid">
        {% for milestone in milestones %}
        <div class="grid-card milestone-item" data-date="{{ milestone.date.isoformat() }}">
            {% if milestone.image_url %}
            <div class="card-img" style="background-image: url('{{ milestone.image_url }}')"></div>
            {% else %}
            <div class="card-img">📷</div>
            {% endif %}
            <div class="card-body">
                <span class="date-badge">{{ milestone.date.strftime('%Y-%m-%d') }}</span>
                <h3>{{ milestone.title }}</h3>
                <p>{{ milestone.description or '' }}</p>
                <div class="card-actions">
                    <form action="{{ url_for('delete_milestone', id=milestone.id) }}" method="POST" onsubmit="return confirm('確定要刪除嗎？')">
                        <button type="submit" class="btn btn-danger">刪除</button>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    // Handle File Upload to Base64 before submit
    document.getElementById('milestone-form').addEventListener('submit', async function(e) {
        const fileInput = document.getElementById('m-upload');
        const hiddenInput = document.getElementById('m-img-data');
        
        if (fileInput.files.length > 0) {
            e.preventDefault();
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = () => {
                hiddenInput.value = reader.result;
                this.submit();
            };
        }
    });

    function sortMilestones(mode) {
        const grid = document.getElementById('milestones-grid');
        const items = Array.from(grid.getElementsByClassName('milestone-item'));
        
        items.sort((a, b) => {
            if (mode === 'date-desc') return new Date(b.dataset.date) - new Date(a.dataset.date);
            if (mode === 'date-asc') return new Date(a.dataset.date) - new Date(b.dataset.date);
            return 0;
        });
        
        items.forEach(item => grid.appendChild(item));
    }
</script>
